<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カーリングシミュレーター</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #1e3a8a; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; }
        .control-panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex: 1; min-width: 320px; }
        .control-group { margin-bottom: 15px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .control-label-area { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: bold; }
        .slider-container { display: flex; align-items: center; gap: 8px; width: 100%; margin-top: 4px; }
        input[type=range] { flex: 1; }
        .val-box { width: 50px; text-align: center; border: 1px solid #ccc; border-radius: 4px; padding: 2px 4px; font-weight: bold; background: #f8fafc; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 20px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-shoot { background-color: #2563eb; color: white; flex: 2; }
        .btn-shoot:hover { background-color: #1d4ed8; }
        .btn-reset { background-color: #64748b; color: white; flex: 1; }
        .btn-reset:hover { background-color: #475569; }
        .btn-csv { background-color: #059669; color: white; flex: 1; }
        .btn-csv:hover { background-color: #047857; }
        
        .simulation-area { flex: 2; min-width: 450px; display: flex; flex-direction: column; gap: 20px; }
        canvas { background-color: #e0f2fe; border: 2px solid #0284c7; border-radius: 8px; width: 100%; height: 260px; display: block; }
        
        .table-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-height: 250px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        th, td { padding: 8px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; font-weight: bold; position: sticky; top: 0; background: #f1f5f9; }
        
        .desc-box { background: #eff6ff; border-left: 4px solid #2563eb; padding: 10px 15px; border-radius: 4px; font-size: 13px; margin-bottom: 15px; }
        .disabled-input { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

    <h1>🥌 カーリングシミュレーター</h1>
    
    <div class="desc-box">
        <strong>【概要】</strong><br>
        チェックボックスを入れた変数が実験（重回帰モデル）に反映されます。<br>
        チェックを外すと項目は「-」としてデータ記録されます。
    </div>

    <div class="container">
        <!-- 操作パネル -->
        <div class="control-panel">
            
            <!-- ① 投球力 -->
            <div class="control-group">
                <div class="control-label-area">
                    <input type="checkbox" id="chk-force" checked onchange="toggleParam('force')">
                    <label for="chk-force">投球力 (デリバリー)</label>
                </div>
                <div class="slider-container" id="box-force">
                    <input type="range" id="param-force" min="80" max="160" value="120" oninput="updateVal('force')">
                    <span id="val-force" class="val-box">120</span>
                </div>
            </div>

            <!-- ② 気温 -->
            <div class="control-group">
                <div class="control-label-area">
                    <input type="checkbox" id="chk-temp" onchange="toggleParam('temp')">
                    <label for="chk-temp">気温 (°C)</label>
                </div>
                <div class="slider-container disabled-input" id="box-temp">
                    <input type="range" id="param-temp" min="-5" max="10" step="0.5" value="2.0" oninput="updateVal('temp')">
                    <span id="val-temp" class="val-box">2.0</span>
                </div>
            </div>

            <!-- ③ スイープ回数 -->
            <div class="control-group">
                <div class="control-label-area">
                    <input type="checkbox" id="chk-sweep" onchange="toggleParam('sweep')">
                    <label for="chk-sweep">スイープ回数</label>
                </div>
                <div class="slider-container disabled-input" id="box-sweep">
                    <input type="range" id="param-sweep" min="0" max="30" value="10" oninput="updateVal('sweep')">
                    <span id="val-sweep" class="val-box">10</span>
                </div>
            </div>

            <!-- ④ ガイド幅 -->
            <div class="control-group">
                <div class="control-label-area">
                    <input type="checkbox" id="chk-guide" checked onchange="toggleParam('guide')">
                    <label for="chk-guide">ガイド幅 (ブレ制限)</label>
                </div>
                <div class="slider-container" id="box-guide">
                    <input type="range" id="param-guide" min="10" max="50" value="30" oninput="updateVal('guide')">
                    <span id="val-guide" class="val-box">30</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-shoot" onclick="shootStone()">投球 (ショット)</button>
                <button class="btn-reset" onclick="resetData()">リセット</button>
            </div>
            <div class="btn-group">
                <button class="btn-csv" onclick="downloadCSV()">CSV出力</button>
            </div>
        </div>

        <!-- 画面・テーブルエリア -->
        <div class="simulation-area">
            <canvas id="canvas" width="800" height="260"></canvas>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>試行</th>
                            <th>投球力</th>
                            <th>気温(°C)</th>
                            <th>スイープ回数</th>
                            <th>ガイド幅</th>
                            <th>飛んだ距離 (m)</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                        <!-- データ追記領域 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let trialCount = 0;
        let historyData = [];
        let stoneHits = [];

        function updateVal(param) {
            document.getElementById(`val-${param}`).innerText = document.getElementById(`param-${param}`).value;
        }

        function toggleParam(param) {
            const chk = document.getElementById(`chk-${param}`);
            const box = document.getElementById(`box-${param}`);
            if (chk.checked) {
                box.classList.remove('disabled-input');
            } else {
                box.classList.add('disabled-input');
            }
        }

        function drawRink() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 氷盤背景
            ctx.fillStyle = '#e0f2fe';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 距離目盛り
            ctx.strokeStyle = '#94a3b8';
            ctx.fillStyle = '#64748b';
            ctx.font = '11px sans-serif';
            for (let x = 50; x <= 750; x += 70) {
                const meters = Math.round((x - 50) / 70 * 4);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
                ctx.fillText(`${meters}m`, x + 2, 15);
            }

            // ハウス（目標円）の描画（真円＆サイズアップ修正）
            const houseX = 50 + (30 / 4) * 70; // 30m付近
            const houseY = canvas.height / 2;
            
            // 赤円 (外) - 半径を大きめに設定 (65px)
            ctx.beginPath();
            ctx.arc(houseX, houseY, 65, 0, Math.PI * 2);
            ctx.fillStyle = '#ef4444';
            ctx.fill();

            // 白円 (中)
            ctx.beginPath();
            ctx.arc(houseX, houseY, 45, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // 青円 (内)
            ctx.beginPath();
            ctx.arc(houseX, houseY, 22, 0, Math.PI * 2);
            ctx.fillStyle = '#2563eb';
            ctx.fill();

            // 中心点
            ctx.beginPath();
            ctx.arc(houseX, houseY, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // 投球済みストーン描画
            stoneHits.forEach(stone => {
                ctx.beginPath();
                ctx.arc(stone.x, stone.y, 7, 0, Math.PI * 2);
                ctx.fillStyle = '#f59e0b';
                ctx.strokeStyle = '#78350f';
                ctx.lineWidth = 2;
                ctx.fill();
                ctx.stroke();
            });
        }

        function shootStone() {
            const isForce = document.getElementById('chk-force').checked;
            const isTemp = document.getElementById('chk-temp').checked;
            const isSweep = document.getElementById('chk-sweep').checked;
            const isGuide = document.getElementById('chk-guide').checked;

            const force = isForce ? parseFloat(document.getElementById('param-force').value) : 120; // 未指定時は標準値120
            const temp = isTemp ? parseFloat(document.getElementById('param-temp').value) : 0;     // 未指定時は0
            const sweep = isSweep ? parseInt(document.getElementById('param-sweep').value) : 0;     // 未指定時は0
            const guide = isGuide ? parseFloat(document.getElementById('param-guide').value) : 30; // 未指定時は30

            // 距離計算（ONになっている変数のみ計算効果が発生）
            const noiseFactor = isGuide ? ((50 - guide) * 0.05 + 0.5) : 1.0;
            const randomNoise = (Math.random() - 0.5) * noiseFactor * 4; 
            
            let distance = (force * 0.22) + (sweep * 0.18) - (temp * 0.35) + randomNoise;
            if (distance < 0) distance = 0;

            trialCount++;

            const startX = 50;
            const endX = Math.min(startX + (distance / 4) * 70, canvas.width - 15);
            const ySpread = isGuide ? (Math.random() - 0.5) * (guide * 0.8) : (Math.random() - 0.5) * 10;
            const endY = (canvas.height / 2) + ySpread;

            stoneHits.push({ x: endX, y: endY });

            // 履歴に保持（チェックOFFの項目は "-" とする）
            const record = {
                trial: trialCount,
                force: isForce ? force : '-',
                temp: isTemp ? temp : '-',
                sweep: isSweep ? sweep : '-',
                guide: isGuide ? guide : '-',
                distance: distance.toFixed(2)
            };
            historyData.push(record);

            const tbody = document.getElementById('data-table');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${record.trial}</td>
                <td>${record.force}</td>
                <td>${record.temp}</td>
                <td>${record.sweep}</td>
                <td>${record.guide}</td>
                <td><strong>${record.distance}</strong></td>
            `;
            tbody.insertBefore(tr, tbody.firstChild);

            drawRink();
        }

        function resetData() {
            trialCount = 0;
            historyData = [];
            stoneHits = [];
            document.getElementById('data-table').innerHTML = '';
            drawRink();
        }

        function downloadCSV() {
            if (historyData.length === 0) {
                alert('データがありません。投球を行ってください。');
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "試行回数,投球力,気温,スイープ回数,ガイド幅,飛んだ距離(m)\n";

            historyData.forEach(row => {
                csvContent += `${row.trial},${row.force},${row.temp},${row.sweep},${row.guide},${row.distance}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "curling_simulation_data.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 初期化実行
        toggleParam('force');
        toggleParam('temp');
        toggleParam('sweep');
        toggleParam('guide');
        drawRink();
    </script>
</body>
</html>
