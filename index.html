<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コイン射撃シミュレーター</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #1e3a8a; }
        
        .top-controls { background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; }
        .control-item { display: flex; align-items: center; gap: 10px; }
        .control-item label { font-weight: bold; font-size: 14px; cursor: pointer; }
        .val-box { width: 60px; text-align: center; border: 1px solid #ccc; border-radius: 4px; padding: 4px; font-weight: bold; background: #f8fafc; font-size: 14px; }
        
        .simulation-container { display: flex; flex-direction: column; gap: 15px; }
        canvas { background-color: #a5b4fc; border: 2px solid #6366f1; border-radius: 8px; width: 100%; max-width: 1200px; height: 260px; display: block; cursor: crosshair; }
        
        .bottom-area { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-csv { background-color: #6366f1; color: white; }
        .btn-csv:hover { background-color: #4f46e5; }
        .btn-reset { background-color: #64748b; color: white; }
        .btn-reset:hover { background-color: #475569; }
        
        .table-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 380px; max-height: 250px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        th, td { padding: 6px 8px; border: 1px solid #cbd5e1; }
        th { background-color: #f1f5f9; font-weight: bold; position: sticky; top: 0; }
        
        .desc-box { background: #eff6ff; border-left: 4px solid #2563eb; padding: 10px 15px; border-radius: 4px; font-size: 13px; margin-bottom: 15px; }
        .disabled-input { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

    <h1>🥌 コイン射撃シミュレーター</h1>
    
    <div class="desc-box">
        <strong>【遊び方】</strong><br>
        発射台内のコインを<strong>マウスで手前に引っ張って放す</strong>と発射します！<br>
        下に引いて放すと上方向に飛んでいきます。1400mを超えたり枠外へ飛び出た場合は「NA（測定不能）」になります。
    </div>

    <!-- 上部設定パネル -->
    <div class="top-controls">
        <div class="control-item">
            <input type="checkbox" id="chk-force" checked onchange="toggleParam('force')">
            <label for="chk-force">作業標準 (投球力制限)</label>
            <input type="range" id="param-force" min="80" max="160" value="120" oninput="updateVal('force')">
            <span id="val-force" class="val-box">120</span>
        </div>

        <div class="control-item">
            <input type="checkbox" id="chk-guide" checked onchange="toggleParam('guide')">
            <label for="chk-guide">ガイド幅</label>
            <input type="range" id="param-guide" min="10" max="50" value="35" oninput="updateVal('guide')">
            <span id="val-guide" class="val-box">35</span>
        </div>

        <div class="control-item">
            <input type="checkbox" id="chk-temp" onchange="toggleParam('temp')">
            <label for="chk-temp">気温 (°C)</label>
            <!-- -10〜35度まで拡張 -->
            <input type="range" id="param-temp" min="-10" max="35" step="0.5" value="2.0" oninput="updateVal('temp')" class="disabled-input">
            <span id="val-temp" class="val-box disabled-input">2.0</span>
        </div>
    </div>

    <div class="simulation-container">
        <canvas id="canvas" width="1200" height="260"></canvas>
        
        <div class="bottom-area">
            <div class="btn-group">
                <button class="btn-csv" onclick="downloadCSV()">CSV出力</button>
                <button class="btn-reset" onclick="resetData()">はじめから</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>試行</th>
                            <th>作業標準</th>
                            <th>ガイド幅</th>
                            <th>飛んだ距離</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let trialCount = 0;
        let historyData = [];
        let stoneHits = [];

        // 発射台設定
        const launcher = {
            x: 20,
            y: 50,
            width: 130,
            height: 160,
            stoneRadius: 10,
            restX: 130,
            restY: 130
        };

        let isDragging = false;
        let dragX = launcher.restX;
        let dragY = launcher.restY;
        let isAnimating = false;

        function updateVal(param) {
            document.getElementById(`val-${param}`).innerText = document.getElementById(`param-${param}`).value;
            drawRink();
        }

        function toggleParam(param) {
            const chk = document.getElementById(`chk-${param}`);
            const slider = document.getElementById(`param-${param}`);
            const val = document.getElementById(`val-${param}`);
            if (chk.checked) {
                slider.classList.remove('disabled-input');
                val.classList.remove('disabled-input');
            } else {
                slider.classList.add('disabled-input');
                val.classList.add('disabled-input');
            }
            drawRink();
        }

        canvas.addEventListener('mousedown', (e) => {
            if (isAnimating) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

            const dist = Math.hypot(mouseX - launcher.restX, mouseY - launcher.restY);
            if (dist < 25) {
                isDragging = true;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging || isAnimating) return;
            const rect = canvas.getBoundingClientRect();
            let mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            let mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

            let minX = launcher.x + 10;
            const isForceLimit = document.getElementById('chk-force').checked;
            
            if (isForceLimit) {
                const forceVal = parseFloat(document.getElementById('param-force').value);
                const limitX = launcher.restX - ((forceVal - 60) * 0.9);
                minX = Math.max(minX, limitX);
            }

            dragX = Math.min(launcher.restX, Math.max(minX, mouseX));
            
            const isGuide = document.getElementById('chk-guide').checked;
            const guideVal = isGuide ? parseFloat(document.getElementById('param-guide').value) : 50;
            const maxYSpread = (guideVal / 50) * 60; 
            dragY = Math.min(launcher.restY + maxYSpread, Math.max(launcher.restY - maxYSpread, mouseY));

            drawRink();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                shootStone();
            }
        });

        function drawRink() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 背景
            ctx.fillStyle = '#a5b4fc';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 目盛り線（100m〜1400m）
            ctx.strokeStyle = '#475569';
            ctx.fillStyle = '#0f172a';
            ctx.font = 'bold 11px sans-serif';
            
            for (let m = 100; m <= 1400; m += 100) {
                const x = 180 + (m - 100) * (970 / 1300);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
                ctx.fillText(m, x - 12, 15);
            }

            // ハウス（目標円）の描画（中心：1100m位置、1000m〜1200mに跨る大サイズ）
            const houseX = 180 + (1100 - 100) * (970 / 1300);
            const houseY = canvas.height / 2;

            // 1000m〜1200mの幅（約75pxの半径）
            const outerRadius = (100 * (970 / 1300)); 

            ctx.beginPath();
            ctx.arc(houseX, houseY, outerRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#ef4444';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(houseX, houseY, outerRadius * 0.66, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(houseX, houseY, outerRadius * 0.33, 0, Math.PI * 2);
            ctx.fillStyle = '#2563eb';
            ctx.fill();

            // 発射台
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(launcher.x, launcher.y, launcher.width, launcher.height, 15);
            ctx.fill();
            ctx.stroke();

            // 平行なガイドライン（青線）
            const isGuide = document.getElementById('chk-guide').checked;
            if (isGuide) {
                const guideVal = parseFloat(document.getElementById('param-guide').value);
                const spread = (guideVal / 50) * 60;
                ctx.strokeStyle = '#2563eb';
                ctx.lineWidth = 2;
                
                // 上の平行線
                ctx.beginPath();
                ctx.moveTo(launcher.x, launcher.restY - spread);
                ctx.lineTo(launcher.x + launcher.width, launcher.restY - spread);
                ctx.stroke();

                // 下の平行線
                ctx.beginPath();
                ctx.moveTo(launcher.x, launcher.restY + spread);
                ctx.lineTo(launcher.x + launcher.width, launcher.restY + spread);
                ctx.stroke();
            }

            // 作業標準 赤ライン
            const isForceLimit = document.getElementById('chk-force').checked;
            if (isForceLimit) {
                const forceVal = parseFloat(document.getElementById('param-force').value);
                const limitX = launcher.restX - ((forceVal - 60) * 0.9);
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(limitX, launcher.y + 5);
                ctx.lineTo(limitX, launcher.y + launcher.height - 5);
                ctx.stroke();
            }

            // 待機 / 引っ張り中のコイン
            if (!isAnimating) {
                if (isDragging) {
                    ctx.strokeStyle = '#f59e0b';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(launcher.restX, launcher.restY);
                    ctx.lineTo(dragX, dragY);
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.arc(dragX, dragY, launcher.stoneRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#334155';
                ctx.fill();
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 2;
                ctx.stroke();

                if (isDragging) {
                    const pullPower = Math.round((launcher.restX - dragX) * 7.5 + 400);
                    ctx.fillStyle = '#1e293b';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.fillText(`Power: ${pullPower}`, dragX - 25, dragY - 15);
                }
            }

            // 過去の着地位置
            stoneHits.forEach(stone => {
                if (stone.x <= canvas.width && stone.y >= 0 && stone.y <= canvas.height) {
                    ctx.beginPath();
                    ctx.arc(stone.x, stone.y, 8, 0, Math.PI * 2);
                    ctx.fillStyle = '#800000';
                    ctx.fill();
                }
            });
        }

        // 投球アニメーション
        function shootStone() {
            isAnimating = true;

            const isForce = document.getElementById('chk-force').checked;
            const isGuide = document.getElementById('chk-guide').checked;
            const isTemp = document.getElementById('chk-temp').checked;

            // 引っ張った量
            const dx = launcher.restX - dragX; 
            const dy = dragY - launcher.restY; // 下に引っ張ると dy > 0

            const isZeroPull = (dx === 0 && dy === 0);
            
            let speed = Math.hypot(dx, dy) * 0.085; 
            if (isZeroPull) speed = 0;

            // パチンコ挙動：下に引っ張る(dy > 0)と、放した時は上(vy < 0)へ飛ばす
            const angle = Math.atan2(-dy, dx); 

            let posX = launcher.restX;
            let posY = launcher.restY;

            let vx = Math.cos(angle) * speed;
            let vy = Math.sin(angle) * speed; 

            const temp = isTemp ? parseFloat(document.getElementById('param-temp').value) : 0;
            const friction = 0.008 + (temp * 0.0003); 

            let isOutOfBounds = false;

            function animate() {
                posX += vx * 3.5; 
                posY += vy * 3.5;

                vx *= (1 - friction);
                vy *= (1 - friction);

                // 上下壁判定
                if (posY < 0 || posY > canvas.height) {
                    isOutOfBounds = true;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawRink();

                ctx.beginPath();
                ctx.arc(posX, posY, launcher.stoneRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#800000';
                ctx.fill();

                const currentSpeed = Math.hypot(vx, vy);

                // 【修正】しきい値を上げてピタッと着地（ノロノロ減速をカット）
                if (currentSpeed > 0.18 && posX < canvas.width + 50 && !isOutOfBounds) {
                    requestAnimationFrame(animate);
                } else {
                    trialCount++;

                    let calculatedDistance = 100 + (posX - 180) * (1300 / 970);

                    let displayDistance = calculatedDistance.toFixed(3);
                    if (calculatedDistance > 1400 || posX < 180 || isOutOfBounds) {
                        displayDistance = 'NA';
                    } else {
                        stoneHits.push({ x: posX, y: posY });
                    }

                    const pulledPower = Math.round(dx * 7.5 + 400);

                    const record = {
                        trial: trialCount,
                        force: isForce ? parseFloat(document.getElementById('param-force').value) : pulledPower,
                        guide: isGuide ? parseFloat(document.getElementById('param-guide').value) : '-',
                        distance: displayDistance
                    };
                    historyData.push(record);

                    const tbody = document.getElementById('data-table');
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${record.trial}</td>
                        <td>${record.force}</td>
                        <td>${record.guide}</td>
                        <td><strong style="${displayDistance === 'NA' ? 'color:#ef4444;' : ''}">${record.distance}</strong></td>
                    `;
                    tbody.insertBefore(tr, tbody.firstChild);

                    dragX = launcher.restX;
                    dragY = launcher.restY;
                    isAnimating = false;
                    drawRink();
                }
            }

            animate();
        }

        function resetData() {
            trialCount = 0;
            historyData = [];
            stoneHits = [];
            dragX = launcher.restX;
            dragY = launcher.restY;
            document.getElementById('data-table').innerHTML = '';
            drawRink();
        }

        function downloadCSV() {
            if (historyData.length === 0) {
                alert('データがありません。');
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "試行,作業標準,ガイド幅,飛んだ距離\n";

            historyData.forEach(row => {
                csvContent += `${row.trial},${row.force},${row.guide},${row.distance}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "coin_shooting_data.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        drawRink();
    </script>
</body>
</html>
